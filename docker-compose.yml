services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: turnero
      POSTGRES_USER: turnero
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: turnero
      DB_USERNAME: turnero
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    command: sh -lc "cp .env.docker .env && composer install && (grep -q '^APP_KEY=base64:' .env || php artisan key:generate) && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: turnero
      DB_USERNAME: turnero
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    command: sh -lc "cp .env.docker .env && composer install && php artisan horizon"
    depends_on:
      - backend
      - redis

  reverb:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: turnero
      DB_USERNAME: turnero
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: localhost
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    command: sh -lc "cp .env.docker .env && composer install && php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - '8080:8080'
    depends_on:
      - backend
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_REVERB_APP_KEY: turnero-key
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
